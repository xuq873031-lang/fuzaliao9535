<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>正在更新页面缓存...</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f7fb;
      color: #1f2d3d;
    }
    .card {
      width: min(92vw, 520px);
      background: #fff;
      border: 1px solid #dce5f2;
      border-radius: 14px;
      padding: 18px 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }
    .muted {
      color: #6c757d;
      font-size: 14px;
      margin-top: 8px;
    }
    .ok {
      color: #198754;
      font-weight: 600;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div>正在清理旧缓存，请稍候...</div>
    <div id="msg" class="muted">这一步用于解决“页面没变化 / 还是旧版”的问题。</div>
  </div>
  <script>
    (async () => {
      const msg = document.getElementById('msg');
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((r) => r.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((k) => caches.delete(k)));
        }
        sessionStorage.clear();
        localStorage.removeItem('chat_api_base');
        localStorage.removeItem('chat_ws_base');
        msg.className = 'ok';
        msg.textContent = '缓存清理完成，正在跳转到新版页面...';
      } catch (e) {
        msg.className = 'muted';
        msg.textContent = '清理时出现异常，正在尝试继续跳转...';
      }
      setTimeout(() => {
        const v = Date.now();
        location.replace(`./index.html?v=${v}`);
      }, 700);
    })();
  </script>
</body>
</html>
