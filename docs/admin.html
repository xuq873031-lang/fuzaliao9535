<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>聊天后台管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script>
    window.__CHAT_CONFIG = {
      API_BASE: "https://web-production-afb64.up.railway.app"
      // 可选：WS_BASE: "wss://web-production-afb64.up.railway.app"
    };
  </script>
  <style>
    :root {
      --panel-bg: #eef3f9;
      --card-bg: #ffffff;
      --line: #d3deec;
      --blue: #1f6fd6;
      --blue-soft: #e9f2ff;
      --text: #1d2a3a;
      --muted: #66768b;
      --danger: #c93a3a;
      --danger-soft: #fff1f1;
    }
    body {
      margin: 0;
      background: var(--panel-bg);
      color: var(--text);
      min-height: 100vh;
    }
    .admin-shell {
      min-height: 100vh;
      display: flex;
    }
    .admin-sidebar {
      width: 220px;
      background: #e8f0fb;
      border-right: 1px solid var(--line);
      padding: 16px 12px;
    }
    .admin-logo {
      font-weight: 700;
      color: var(--blue);
      margin-bottom: 18px;
      letter-spacing: 0.4px;
    }
    .admin-nav .btn {
      width: 100%;
      text-align: left;
      margin-bottom: 8px;
      border-radius: 10px;
    }
    .admin-nav .btn.btn-primary {
      background: linear-gradient(180deg, #2d81e5, #1e6fd7);
      border-color: #1e6fd7;
    }
    .admin-main {
      flex: 1;
      padding: 16px;
      overflow: auto;
    }
    .admin-topbar {
      background: var(--card-bg);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .admin-card {
      background: var(--card-bg);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 6px 16px rgba(19, 46, 84, 0.04);
    }
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 10px 28px rgba(16, 38, 70, 0.08);
    }
    .form-control:focus {
      border-color: #94bff7;
      box-shadow: 0 0 0 0.2rem rgba(47, 131, 228, 0.16);
    }
    .table > :not(caption) > * > * {
      border-bottom-color: #e5edf8;
      vertical-align: middle;
    }
    .table thead th {
      background: #f6f9fe;
      color: #38506f;
      font-weight: 600;
      white-space: nowrap;
    }
    .table-hover > tbody > tr:hover > * {
      background: #f8fbff;
    }
    .btn-outline-danger {
      color: var(--danger);
      border-color: #e3a5a5;
      background: #fff;
    }
    .btn-outline-danger:hover,
    .btn-outline-danger:focus {
      color: #fff;
      background: var(--danger);
      border-color: var(--danger);
    }
    .btn-danger {
      background: var(--danger);
      border-color: var(--danger);
      box-shadow: 0 2px 0 rgba(130, 22, 22, 0.15);
    }
    .btn-danger:hover,
    .btn-danger:focus {
      background: #b22f2f;
      border-color: #b22f2f;
    }
    .badge.text-bg-danger {
      background: #d9534f !important;
    }
    .badge.text-bg-secondary {
      background: #74859e !important;
    }
    .badge.text-bg-success {
      background: #2f9b5f !important;
    }
    [data-delete-cancelled] {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: #efb6b6;
    }
    @media (max-width: 991.98px) {
      .admin-sidebar {
        display: none;
      }
      .admin-main {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="loginView" class="login-wrap">
    <div class="login-card">
      <h5 class="mb-3">后台管理登录</h5>
      <div class="text-secondary small mb-3">仅管理员可访问</div>
      <form id="adminLoginForm" class="d-grid gap-3">
        <div>
          <label class="form-label">账号</label>
          <input id="adminAccount" class="form-control" placeholder="请输入管理员账号" required />
        </div>
        <div>
          <label class="form-label">密码</label>
          <input id="adminPassword" type="password" class="form-control" required />
        </div>
        <button id="adminLoginBtn" class="btn btn-primary" type="submit">登录后台</button>
      </form>
      <div id="loginError" class="text-danger small mt-3 d-none"></div>
      <a href="./index.html" class="btn btn-link btn-sm mt-2">返回聊天首页</a>
    </div>
  </div>

  <div id="adminView" class="admin-shell d-none">
    <aside class="admin-sidebar">
      <div class="admin-logo">数据分析平台</div>
      <div class="admin-nav">
        <button class="btn btn-primary" type="button">系统用户</button>
      </div>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <div>
          <div class="fw-semibold">系统用户管理</div>
          <div class="small text-secondary">查看客户注册与登录状态，支持安全重置密码</div>
        </div>
        <div class="d-flex gap-2">
          <button id="refreshUsersBtn" class="btn btn-outline-secondary btn-sm" type="button">刷新</button>
          <button id="logoutBtn" class="btn btn-outline-danger btn-sm" type="button">退出</button>
        </div>
      </div>

      <div class="admin-card">
        <div class="row g-2 mb-3">
          <div class="col-12 col-md-5">
            <input id="userKeyword" class="form-control" placeholder="搜索账号 / 昵称" />
          </div>
          <div class="col-12 col-md-4">
            <div class="btn-group w-100" role="group">
              <button id="filterActiveBtn" class="btn btn-primary btn-sm" type="button">正常账号</button>
              <button id="filterProcessedBtn" class="btn btn-outline-secondary btn-sm" type="button">已处理账号</button>
            </div>
          </div>
          <div class="col-12 col-md-3 d-flex justify-content-md-end">
            <span id="adminHint" class="small text-secondary align-self-center text-md-end">准备就绪</span>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr>
                <th>账号</th>
                <th>昵称</th>
                <th>角色</th>
                <th>注册时间</th>
                <th>最后在线</th>
                <th>账号状态</th>
                <th>在线</th>
                <th>踢人权限</th>
                <th>禁言权限</th>
                <th>编辑权限</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div class="modal fade" id="resetPwdModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">重置用户密码</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input id="resetUserId" type="hidden" />
          <div class="mb-2">
            <label class="form-label">新密码</label>
            <input id="resetPwd1" type="password" class="form-control" />
          </div>
          <div>
            <label class="form-label">确认新密码</label>
            <input id="resetPwd2" type="password" class="form-control" />
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button id="confirmResetBtn" class="btn btn-danger" type="button">确认重置</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const STORAGE_KEYS = {
      token: 'chatwave_token',
      tokenLegacy: 'admin_access_token',
      apiBase: 'chat_api_base'
    };
    const DEFAULT_API_BASE = String(
      (window.__CHAT_CONFIG && window.__CHAT_CONFIG.API_BASE) || 'https://web-production-afb64.up.railway.app'
    ).trim().replace(/\/$/, '');
    const API_BASE_CANDIDATES = Array.from(new Set(
      [
        DEFAULT_API_BASE,
        'https://web-production-afb64.up.railway.app',
        'https://web-production-be9f.up.railway.app',
        'https://web-production-f9619e.up.railway.app'
      ]
        .map((x) => String(x || '').trim().replace(/\/$/, ''))
        .filter((x) => /^https?:\/\//i.test(x))
    ));

    const state = {
      users: [],
      currentUser: null,
      userListMode: 'active'
    };

    function getApiBase() {
      const saved = String(localStorage.getItem(STORAGE_KEYS.apiBase) || '').trim().replace(/\/$/, '');
      if (saved && /^https?:\/\//i.test(saved)) return saved;
      localStorage.setItem(STORAGE_KEYS.apiBase, DEFAULT_API_BASE);
      return DEFAULT_API_BASE;
    }

    function setApiBase(base) {
      const normalized = String(base || '').trim().replace(/\/$/, '');
      if (!normalized || !/^https?:\/\//i.test(normalized)) return;
      localStorage.setItem(STORAGE_KEYS.apiBase, normalized);
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = 10000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        return await fetch(url, { ...options, signal: controller.signal });
      } finally {
        clearTimeout(timer);
      }
    }

    async function ensureReachableApiBase() {
      const current = getApiBase();
      const candidates = [current, ...API_BASE_CANDIDATES.filter((x) => x !== current)];
      for (const base of candidates) {
        try {
          const res = await fetchWithTimeout(`${base}/health`, { method: 'GET', cache: 'no-store' }, 7000);
          if (res && res.ok) {
            if (base !== current) setApiBase(base);
            return base;
          }
        } catch (_) {}
      }
      return current;
    }

    function getToken() {
      return (
        localStorage.getItem(STORAGE_KEYS.token) ||
        sessionStorage.getItem(STORAGE_KEYS.token) ||
        localStorage.getItem(STORAGE_KEYS.tokenLegacy) ||
        sessionStorage.getItem(STORAGE_KEYS.tokenLegacy) ||
        ''
      );
    }
    function setToken(token) {
      if (!token) return;
      localStorage.setItem(STORAGE_KEYS.token, token);
      sessionStorage.setItem(STORAGE_KEYS.token, token);
      localStorage.setItem(STORAGE_KEYS.tokenLegacy, token);
      sessionStorage.setItem(STORAGE_KEYS.tokenLegacy, token);
    }
    function clearToken() {
      localStorage.removeItem(STORAGE_KEYS.token);
      sessionStorage.removeItem(STORAGE_KEYS.token);
      localStorage.removeItem(STORAGE_KEYS.tokenLegacy);
      sessionStorage.removeItem(STORAGE_KEYS.tokenLegacy);
    }

    function setHint(text) {
      const el = document.getElementById('adminHint');
      if (el) el.textContent = text;
    }

    function showLoginError(msg) {
      const el = document.getElementById('loginError');
      if (!el) return;
      el.textContent = msg;
      el.classList.remove('d-none');
    }

    function hideLoginError() {
      const el = document.getElementById('loginError');
      if (!el) return;
      el.classList.add('d-none');
      el.textContent = '';
    }

    function switchToAdmin() {
      document.getElementById('loginView').classList.add('d-none');
      document.getElementById('adminView').classList.remove('d-none');
    }

    function switchToLogin() {
      document.getElementById('adminView').classList.add('d-none');
      document.getElementById('loginView').classList.remove('d-none');
    }

    function formatTime(v) {
      if (!v) return '暂无';
      const d = new Date(v);
      if (Number.isNaN(d.getTime())) return '暂无';
      return new Intl.DateTimeFormat('zh-CN', {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit'
      }).format(d);
    }

    async function apiFetch(path, options = {}) {
      const headers = { ...(options.headers || {}) };
      const body = options.body;
      if (body && typeof body === 'string' && !headers['Content-Type']) {
        headers['Content-Type'] = 'application/json';
      }
      const token = getToken();
      if (token) headers.Authorization = `Bearer ${token}`;
      const isProtected = path.startsWith('/api/admin/') || path === '/api/users/me';
      if (isProtected && !headers.Authorization) {
        const err = new Error('管理员登录态丢失，请重新登录');
        err.status = 401;
        clearToken();
        switchToLogin();
        throw err;
      }
      const current = getApiBase();
      const candidates = [current, ...API_BASE_CANDIDATES.filter((x) => x !== current)];
      let res = null;
      let lastNetworkErr = null;
      let successBase = current;
      let lastHttpRes = null;
      const shouldRetryOn404 = path.startsWith('/api/admin/') || path.startsWith('/api/auth/') || path === '/api/users/me';
      for (const base of candidates) {
        try {
          const currentRes = await fetchWithTimeout(`${base}${path}`, { ...options, headers }, 12000);
          lastHttpRes = currentRes;
          if (currentRes.status === 404 && shouldRetryOn404) {
            continue;
          }
          res = currentRes;
          successBase = base;
          break;
        } catch (err) {
          lastNetworkErr = err;
        }
      }
      if (!res) {
        if (lastHttpRes) {
          res = lastHttpRes;
          successBase = current;
        } else {
          const err = new Error(`网络请求失败：${lastNetworkErr?.message || 'Load failed'}`);
          err.status = 0;
          throw err;
        }
      }
      if (successBase !== current) {
        setApiBase(successBase);
      }

      if (!res.ok) {
        let detail = `请求失败(${res.status})`;
        try {
          const ct = res.headers.get('content-type') || '';
          if (ct.includes('application/json')) {
            const data = await res.json();
            detail = data.detail || detail;
          } else {
            const txt = await res.text();
            detail = txt || detail;
          }
        } catch (_) {}

        const err = new Error(detail);
        err.status = res.status;
        if (res.status === 401) {
          clearToken();
          switchToLogin();
        }
        throw err;
      }

      const ct = res.headers.get('content-type') || '';
      if (ct.includes('application/json')) return res.json();
      return null;
    }

    async function login(account, password) {
      return apiFetch('/api/auth/login', {
        method: 'POST',
        body: JSON.stringify({ username: account, password })
      });
    }

    async function getMe() {
      return apiFetch('/api/users/me');
    }

    async function loadUsers() {
      setHint('正在加载用户...');
      const rows = await apiFetch('/api/admin/users');
      state.users = Array.isArray(rows) ? rows : [];
      renderUsers();
      setHint(`已加载 ${state.users.length} 个用户`);
    }

    async function resetPassword(userId, p1, p2) {
      return apiFetch(`/api/admin/users/${userId}/reset-password`, {
        method: 'POST',
        body: JSON.stringify({ new_password: p1, confirm_password: p2 })
      });
    }

    async function updatePermissions(userId, payload) {
      return apiFetch(`/api/admin/users/${userId}/permissions`, {
        method: 'PUT',
        body: JSON.stringify(payload)
      });
    }

    async function updateUserStatus(userId, payload) {
      return apiFetch(`/api/admin/users/${userId}/status`, {
        method: 'PUT',
        body: JSON.stringify(payload)
      });
    }

    async function deleteCancelledUser(userId) {
      return apiFetch(`/api/admin/users/${userId}`, { method: 'DELETE' });
    }

    function renderUsers() {
      const tbody = document.getElementById('userTableBody');
      const keyword = (document.getElementById('userKeyword').value || '').trim().toLowerCase();
      const isProcessed = (u) => !u.is_active || !!u.is_banned;
      const modeFiltered = state.users.filter((u) => {
        if (state.userListMode === 'processed') return isProcessed(u);
        return !isProcessed(u);
      });
      const rows = keyword
        ? modeFiltered.filter(u => String(u.username || '').toLowerCase().includes(keyword) || String(u.nickname || '').toLowerCase().includes(keyword))
        : modeFiltered;

      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="11" class="text-secondary">暂无匹配用户</td></tr>';
        return;
      }

      tbody.innerHTML = '';
      rows.forEach((u) => {
        const statusLabel = !u.is_active
          ? '<span class="badge text-bg-secondary">已注销</span>'
          : (u.is_banned ? '<span class="badge text-bg-danger">已封禁</span>' : '<span class="badge text-bg-success">正常</span>');
        const statusAction = !u.is_active
          ? '<button class="btn btn-sm btn-outline-success" data-reactivate="' + u.id + '">恢复账号</button>'
          : '<button class="btn btn-sm btn-outline-secondary" data-deactivate="' + u.id + '">注销账号</button>';
        const deleteCancelledAction = !u.is_active
          ? '<button class="btn btn-sm btn-danger" data-delete-cancelled="' + u.id + '">删除已注销</button>'
          : '';
        const banAction = u.is_banned
          ? '<button class="btn btn-sm btn-outline-success" data-unban="' + u.id + '">解除封禁</button>'
          : '<button class="btn btn-sm btn-outline-danger" data-ban="' + u.id + '">封禁账号</button>';

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${u.username || ''}</td>
          <td>${u.nickname || ''}</td>
          <td>${u.role || ''}</td>
          <td>${formatTime(u.created_at)}</td>
          <td>${formatTime(u.last_seen_at)}</td>
          <td>${statusLabel}</td>
          <td>${u.is_online ? '<span class="badge text-bg-success">在线</span>' : '<span class="badge text-bg-secondary">离线</span>'}</td>
          <td><input type="checkbox" class="form-check-input perm-kick" ${u.can_kick_members ? 'checked' : ''} /></td>
          <td><input type="checkbox" class="form-check-input perm-mute" ${u.can_mute_members ? 'checked' : ''} /></td>
          <td><input type="checkbox" class="form-check-input perm-edit" ${u.can_use_edit_feature ? 'checked' : ''} /></td>
          <td class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-primary" data-save-perm="${u.id}">保存权限</button>
            <button class="btn btn-sm btn-outline-danger" data-reset="${u.id}">重置密码</button>
            ${statusAction}
            ${deleteCancelledAction}
            ${banAction}
          </td>
        `;
        const saveBtn = tr.querySelector('[data-save-perm]');
        saveBtn.addEventListener('click', async () => {
          const canKick = !!tr.querySelector('.perm-kick')?.checked;
          const canMute = !!tr.querySelector('.perm-mute')?.checked;
          const canEdit = !!tr.querySelector('.perm-edit')?.checked;
          try {
            saveBtn.disabled = true;
            saveBtn.textContent = '保存中...';
            await updatePermissions(u.id, {
              can_kick_members: canKick,
              can_mute_members: canMute,
              can_use_edit_feature: canEdit
            });
            u.can_kick_members = canKick;
            u.can_mute_members = canMute;
            u.can_use_edit_feature = canEdit;
            setHint(`已更新 ${u.username} 的权限`);
          } catch (err) {
            alert(`保存权限失败(${err.status || 'ERR'}): ${err.message}`);
          } finally {
            saveBtn.disabled = false;
            saveBtn.textContent = '保存权限';
          }
        });
        const btn = tr.querySelector('[data-reset]');
        btn.addEventListener('click', () => {
          document.getElementById('resetUserId').value = String(u.id);
          document.getElementById('resetPwd1').value = '';
          document.getElementById('resetPwd2').value = '';
          new bootstrap.Modal(document.getElementById('resetPwdModal')).show();
        });

        const deactivateBtn = tr.querySelector('[data-deactivate]');
        if (deactivateBtn) {
          deactivateBtn.addEventListener('click', async () => {
            if (!confirm(`确定注销账号 ${u.username} 吗？注销后该账号无法登录。`)) return;
            try {
              deactivateBtn.disabled = true;
              await updateUserStatus(u.id, { is_active: false });
              u.is_active = false;
              u.is_online = false;
              renderUsers();
              setHint(`已注销账号：${u.username}`);
            } catch (err) {
              alert(`注销失败(${err.status || 'ERR'}): ${err.message}`);
            } finally {
              deactivateBtn.disabled = false;
            }
          });
        }

        const reactivateBtn = tr.querySelector('[data-reactivate]');
        if (reactivateBtn) {
          reactivateBtn.addEventListener('click', async () => {
            try {
              reactivateBtn.disabled = true;
              await updateUserStatus(u.id, { is_active: true });
              u.is_active = true;
              renderUsers();
              setHint(`已恢复账号：${u.username}`);
            } catch (err) {
              alert(`恢复失败(${err.status || 'ERR'}): ${err.message}`);
            } finally {
              reactivateBtn.disabled = false;
            }
          });
        }

        const deleteCancelledBtn = tr.querySelector('[data-delete-cancelled]');
        if (deleteCancelledBtn) {
          deleteCancelledBtn.addEventListener('click', async () => {
            if (!confirm(`确认永久删除已注销账号 ${u.username} 吗？`)) return;
            if (!confirm('此操作不可恢复，确定继续删除？')) return;
            try {
              deleteCancelledBtn.disabled = true;
              await deleteCancelledUser(u.id);
              state.users = state.users.filter((x) => Number(x.id) !== Number(u.id));
              renderUsers();
              setHint(`已删除已注销账号：${u.username}`);
            } catch (err) {
              alert(`删除失败(${err.status || 'ERR'}): ${err.message}`);
            } finally {
              deleteCancelledBtn.disabled = false;
            }
          });
        }

        const banBtn = tr.querySelector('[data-ban]');
        if (banBtn) {
          banBtn.addEventListener('click', async () => {
            if (!confirm(`确定封禁账号 ${u.username} 吗？封禁后该账号无法登录。`)) return;
            try {
              banBtn.disabled = true;
              await updateUserStatus(u.id, { is_banned: true });
              u.is_banned = true;
              u.is_online = false;
              renderUsers();
              setHint(`已封禁账号：${u.username}`);
            } catch (err) {
              alert(`封禁失败(${err.status || 'ERR'}): ${err.message}`);
            } finally {
              banBtn.disabled = false;
            }
          });
        }

        const unbanBtn = tr.querySelector('[data-unban]');
        if (unbanBtn) {
          unbanBtn.addEventListener('click', async () => {
            try {
              unbanBtn.disabled = true;
              await updateUserStatus(u.id, { is_banned: false });
              u.is_banned = false;
              renderUsers();
              setHint(`已解除封禁：${u.username}`);
            } catch (err) {
              alert(`解除封禁失败(${err.status || 'ERR'}): ${err.message}`);
            } finally {
              unbanBtn.disabled = false;
            }
          });
        }
        tbody.appendChild(tr);
      });
    }

    async function ensureAdminSession() {
      const token = getToken();
      if (!token) {
        switchToLogin();
        return;
      }
      try {
        const me = await getMe();
        if ((me.role || '').toLowerCase() !== 'admin') {
          clearToken();
          switchToLogin();
          showLoginError('当前账号不是管理员，不能访问后台');
          return;
        }
        state.currentUser = me;
        switchToAdmin();
        await loadUsers();
      } catch (err) {
        switchToLogin();
      }
    }

    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideLoginError();
      const btn = document.getElementById('adminLoginBtn');
      const account = document.getElementById('adminAccount').value.trim();
      const password = document.getElementById('adminPassword').value.trim();
      if (!account || !password) {
        showLoginError('请输入账号和密码');
        return;
      }

      try {
        btn.disabled = true;
        btn.textContent = '登录中...';
        const data = await login(account, password);
        setToken(data.token || data.access_token || data.jwt || '');
        const me = await getMe();
        if ((me.role || '').toLowerCase() !== 'admin') {
          clearToken();
          showLoginError('当前账号不是管理员，不能访问后台');
          return;
        }
        state.currentUser = me;
        switchToAdmin();
        await loadUsers();
      } catch (err) {
        showLoginError(`登录失败(${err.status || 'ERR'}): ${err.message}`);
      } finally {
        btn.disabled = false;
        btn.textContent = '登录后台';
      }
    });

    document.getElementById('refreshUsersBtn').addEventListener('click', async () => {
      try {
        await loadUsers();
      } catch (err) {
        alert(`刷新失败：${err.message}`);
      }
    });

    document.getElementById('userKeyword').addEventListener('input', renderUsers);
    document.getElementById('filterActiveBtn').addEventListener('click', () => {
      state.userListMode = 'active';
      document.getElementById('filterActiveBtn').classList.add('btn-primary');
      document.getElementById('filterActiveBtn').classList.remove('btn-outline-primary');
      document.getElementById('filterProcessedBtn').classList.remove('btn-secondary');
      document.getElementById('filterProcessedBtn').classList.add('btn-outline-secondary');
      renderUsers();
    });
    document.getElementById('filterProcessedBtn').addEventListener('click', () => {
      state.userListMode = 'processed';
      document.getElementById('filterProcessedBtn').classList.add('btn-secondary');
      document.getElementById('filterProcessedBtn').classList.remove('btn-outline-secondary');
      document.getElementById('filterActiveBtn').classList.remove('btn-primary');
      document.getElementById('filterActiveBtn').classList.add('btn-outline-primary');
      renderUsers();
    });

    document.getElementById('confirmResetBtn').addEventListener('click', async () => {
      const uid = Number(document.getElementById('resetUserId').value || 0);
      const p1 = document.getElementById('resetPwd1').value.trim();
      const p2 = document.getElementById('resetPwd2').value.trim();
      if (!uid) return;
      if (!p1 || p1.length < 6) {
        alert('新密码长度至少 6 位');
        return;
      }
      if (p1 !== p2) {
        alert('两次密码不一致');
        return;
      }
      if (!confirm('确认重置该用户密码？')) return;

      const btn = document.getElementById('confirmResetBtn');
      try {
        btn.disabled = true;
        btn.textContent = '重置中...';
        await resetPassword(uid, p1, p2);
        const modal = bootstrap.Modal.getInstance(document.getElementById('resetPwdModal'));
        if (modal) modal.hide();
        alert('密码重置成功');
      } catch (err) {
        alert(`重置失败(${err.status || 'ERR'}): ${err.message}`);
      } finally {
        btn.disabled = false;
        btn.textContent = '确认重置';
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      clearToken();
      switchToLogin();
      hideLoginError();
      setHint('已退出');
    });

    ensureReachableApiBase().finally(() => ensureAdminSession());
  </script>
</body>
</html>
